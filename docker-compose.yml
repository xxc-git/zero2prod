services:
  app:
    image: zero2prod:latest
    environment:
      APP_DATABASE_HOST: "db"
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "newsletter"
    ports: 
      - "5432:5432"